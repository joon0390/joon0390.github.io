<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LOOCV performance comparison</title>
  <desc id="desc">A bar chart comparing MAE and MSE across KRR, BKMR, BDKMR Equal, and BDKMR.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4fbfd"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#11395b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="80" y="90" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#103754">LOOCV Performance Comparison</text>
  <text x="80" y="132" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="23" fill="#47657f">Reported predictive errors from the Applied Sciences 2025 study</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="700" height="610" rx="28" fill="#ffffff"/>
    <rect x="830" y="180" width="700" height="610" rx="28" fill="#ffffff"/>
    <rect x="70" y="820" width="1460" height="48" rx="24" fill="#dff7ef"/>
  </g>

  <text x="108" y="236" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#103754">MAE</text>
  <text x="868" y="236" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#103754">MSE</text>

  <g font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#6d879a">
    <text x="170" y="278">0.0</text>
    <text x="335" y="278">0.4</text>
    <text x="500" y="278">0.8</text>
    <text x="645" y="278">1.2</text>

    <text x="930" y="278">0.0</text>
    <text x="1080" y="278">1.2</text>
    <text x="1230" y="278">2.4</text>
    <text x="1380" y="278">3.6</text>
  </g>

  <g stroke="#d7e6ed" stroke-width="2">
    <line x1="180" y1="290" x2="660" y2="290"/>
    <line x1="180" y1="290" x2="180" y2="720"/>
    <line x1="340" y1="290" x2="340" y2="720"/>
    <line x1="500" y1="290" x2="500" y2="720"/>
    <line x1="660" y1="290" x2="660" y2="720"/>

    <line x1="940" y1="290" x2="1420" y2="290"/>
    <line x1="940" y1="290" x2="940" y2="720"/>
    <line x1="1100" y1="290" x2="1100" y2="720"/>
    <line x1="1260" y1="290" x2="1260" y2="720"/>
    <line x1="1420" y1="290" x2="1420" y2="720"/>
  </g>

  <g font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    <text x="110" y="352" font-size="22" font-weight="600" fill="#103754">KRR</text>
    <text x="110" y="452" font-size="22" font-weight="600" fill="#103754">BKMR</text>
    <text x="110" y="552" font-size="22" font-weight="600" fill="#103754">BDKMR(Equal)</text>
    <text x="110" y="652" font-size="22" font-weight="700" fill="#103754">BDKMR</text>

    <rect x="180" y="322" width="446" height="46" rx="23" fill="#bccdda"/>
    <rect x="180" y="422" width="279" height="46" rx="23" fill="#7da4c1"/>
    <rect x="180" y="522" width="80" height="46" rx="23" fill="#7fd6c6"/>
    <rect x="180" y="622" width="76" height="46" rx="23" fill="#0f7c87"/>

    <text x="640" y="352" font-size="22" font-weight="600" fill="#103754">1.1141</text>
    <text x="474" y="452" font-size="22" font-weight="600" fill="#103754">0.6977</text>
    <text x="275" y="552" font-size="22" font-weight="600" fill="#103754">0.2006</text>
    <text x="271" y="652" font-size="22" font-weight="700" fill="#0f7c87">0.1895</text>
  </g>

  <g font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif">
    <text x="870" y="352" font-size="22" font-weight="600" fill="#103754">KRR</text>
    <text x="870" y="452" font-size="22" font-weight="600" fill="#103754">BKMR</text>
    <text x="870" y="552" font-size="22" font-weight="600" fill="#103754">BDKMR(Equal)</text>
    <text x="870" y="652" font-size="22" font-weight="700" fill="#103754">BDKMR</text>

    <rect x="940" y="322" width="476" height="46" rx="23" fill="#bccdda"/>
    <rect x="940" y="422" width="126" height="46" rx="23" fill="#7da4c1"/>
    <rect x="940" y="522" width="10" height="46" rx="5" fill="#7fd6c6"/>
    <rect x="940" y="622" width="8" height="46" rx="4" fill="#0f7c87"/>

    <text x="1430" y="352" font-size="22" font-weight="600" fill="#103754">3.5665</text>
    <text x="1080" y="452" font-size="22" font-weight="600" fill="#103754">0.9447</text>
    <text x="964" y="552" font-size="22" font-weight="600" fill="#103754">0.0721</text>
    <text x="960" y="652" font-size="22" font-weight="700" fill="#0f7c87">0.0629</text>
  </g>

  <g>
    <rect x="112" y="720" width="270" height="56" rx="18" fill="#eef8fb"/>
    <text x="136" y="754" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#103754">Best overall: BDKMR</text>

    <rect x="408" y="720" width="280" height="56" rx="18" fill="#eef8fb"/>
    <text x="432" y="754" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#103754">Heteroscedastic variant wins</text>
  </g>

  <text x="100" y="852" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#135f65">Compared with BKMR, BDKMR reduced MAE by about 72.8% and MSE by about 93.3%.</text>
</svg>
