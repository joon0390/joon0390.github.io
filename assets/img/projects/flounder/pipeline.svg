<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flatfish growth prediction study summary</title>
  <desc id="desc">A visual summary of the olive flounder growth prediction study using Bayesian Deep Kernel Machine Regression.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef8fb"/>
      <stop offset="55%" stop-color="#f8fcfd"/>
      <stop offset="100%" stop-color="#edf7f3"/>
    </linearGradient>
    <linearGradient id="navyCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11395b"/>
      <stop offset="100%" stop-color="#1c5477"/>
    </linearGradient>
    <linearGradient id="tealCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ba9b3"/>
      <stop offset="100%" stop-color="#167f93"/>
    </linearGradient>
    <linearGradient id="mintCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dff7ef"/>
      <stop offset="100%" stop-color="#c7efe4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#11395b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.16">
    <circle cx="1445" cy="126" r="70" fill="#8ed9d3"/>
    <circle cx="1520" cy="158" r="34" fill="#6fc4d1"/>
    <path d="M1328 122c46-40 124-34 164 10-42 46-121 52-164 10zm-26 8 30 16-30 16c8-9 8-23 0-32z" fill="#66bcc7"/>
  </g>

  <text x="80" y="90" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#103754">Flatfish Growth Prediction with BDKMR</text>
  <text x="80" y="132" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="23" fill="#47657f">Bayesian deep kernel learning for aquaculture growth forecasting in South Korea</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="410" height="640" rx="28" fill="#ffffff"/>
    <rect x="520" y="180" width="570" height="640" rx="28" fill="#ffffff"/>
    <rect x="1130" y="180" width="400" height="640" rx="28" fill="#ffffff"/>
  </g>

  <g>
    <rect x="92" y="208" width="366" height="96" rx="24" fill="url(#navyCard)"/>
    <text x="122" y="248" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Study Scope</text>
    <text x="122" y="282" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#d9edf7">Longitudinal farm data aligned to monthly growth windows</text>

    <rect x="100" y="334" width="160" height="118" rx="22" fill="#f1f7fb"/>
    <text x="120" y="372" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Locations</text>
    <text x="120" y="414" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#103754">Wando</text>
    <text x="120" y="442" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#1e8ea0">+</text>
    <text x="150" y="442" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#103754">Jeju</text>

    <rect x="282" y="334" width="176" height="118" rx="22" fill="#f1f7fb"/>
    <text x="302" y="372" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Coverage</text>
    <text x="302" y="414" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#103754">7 tanks</text>
    <text x="302" y="442" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#52718a">5 farms total</text>

    <rect x="100" y="474" width="358" height="118" rx="22" fill="#f1f7fb"/>
    <text x="120" y="512" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Study period</text>
    <text x="120" y="554" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#103754">Mar 2023 - Jul 2024</text>
    <text x="120" y="582" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#52718a">Tank coverage varies by farm</text>

    <text x="100" y="638" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#103754">Signals Used</text>

    <rect x="100" y="662" width="170" height="46" rx="23" fill="#dff6f0"/>
    <text x="122" y="692" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#136b66">Water temp</text>
    <rect x="282" y="662" width="176" height="46" rx="23" fill="#d9f0fb"/>
    <text x="304" y="692" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#11668d">Dissolved oxygen</text>

    <rect x="100" y="722" width="170" height="46" rx="23" fill="#fff0da"/>
    <text x="122" y="752" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#935b14">Feed per fish</text>
    <rect x="282" y="722" width="176" height="46" rx="23" fill="#eef1ff"/>
    <text x="304" y="752" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#4456a6">Init log weight</text>

    <text x="100" y="799" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Outcome: monthly log mean weight from 50 sampled fish per farm</text>
  </g>

  <g>
    <rect x="548" y="208" width="514" height="96" rx="24" fill="url(#tealCard)"/>
    <text x="578" y="248" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Model Pipeline</text>
    <text x="578" y="282" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#dbfbff">Temporal alignment, neural features, Gaussian process uncertainty</text>

    <rect x="568" y="346" width="210" height="104" rx="24" fill="#eef8fb" stroke="#cde7ef"/>
    <text x="598" y="386" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#103754">Sensor streams</text>
    <text x="598" y="420" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Minute-level temp / DO</text>
    <text x="598" y="444" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Daily feed records</text>

    <rect x="836" y="346" width="210" height="104" rx="24" fill="#eef8fb" stroke="#cde7ef"/>
    <text x="866" y="386" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#103754">Time alignment</text>
    <text x="866" y="420" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Aggregate signals over</text>
    <text x="866" y="444" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">each growth interval</text>

    <rect x="702" y="500" width="210" height="104" rx="24" fill="#eef8fb" stroke="#cde7ef"/>
    <text x="732" y="540" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#103754">ANN feature map</text>
    <text x="732" y="574" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Learn nonlinear latent</text>
    <text x="732" y="598" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">representations</text>

    <rect x="836" y="654" width="210" height="104" rx="24" fill="#eef8fb" stroke="#cde7ef"/>
    <text x="866" y="694" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#103754">GP kernel layer</text>
    <text x="866" y="728" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Bayesian regression with</text>
    <text x="866" y="752" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">uncertainty estimates</text>

    <rect x="568" y="654" width="210" height="104" rx="24" fill="#eef8fb" stroke="#cde7ef"/>
    <text x="598" y="694" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#103754">Likelihood</text>
    <text x="598" y="728" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Var(y_i) = sigma^2 / n_i</text>
    <text x="598" y="752" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Observation-level precision</text>

    <path d="M778 398h38" stroke="#1f8fa2" stroke-width="8" stroke-linecap="round"/>
    <path d="M811 382l26 16-26 16z" fill="#1f8fa2"/>

    <path d="M941 458v22c0 10-8 18-18 18H826" fill="none" stroke="#1f8fa2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M830 481l-26 16 26 16z" fill="#1f8fa2"/>

    <path d="M807 608v24c0 10-8 18-18 18H788" fill="none" stroke="#1f8fa2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M793 616l-16 24-16-24z" fill="#1f8fa2"/>

    <path d="M941 608v22" stroke="#1f8fa2" stroke-width="8" stroke-linecap="round"/>
    <path d="M925 626l16 26 16-26z" fill="#1f8fa2"/>

    <rect x="610" y="786" width="380" height="22" rx="11" fill="#d8ecef"/>
    <rect x="610" y="786" width="310" height="22" rx="11" fill="#28a3ad"/>
    <text x="610" y="832" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#52718a">Inference: MAP estimation + Laplace approximation</text>
  </g>

  <g>
    <rect x="1152" y="208" width="356" height="96" rx="24" fill="url(#mintCard)"/>
    <text x="1182" y="248" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#103754">Key Outcomes</text>
    <text x="1182" y="282" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#4e6f6b">LOOCV benchmark against KRR and BKMR</text>

    <rect x="1160" y="338" width="340" height="118" rx="22" fill="#103754"/>
    <text x="1186" y="382" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#b8d8eb">Best model</text>
    <text x="1186" y="424" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">BDKMR</text>

    <rect x="1160" y="480" width="160" height="136" rx="22" fill="#eef8fb"/>
    <text x="1186" y="522" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#52718a">MAE</text>
    <text x="1186" y="572" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#0f7c87">0.1895</text>
    <text x="1186" y="604" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">lowest error</text>

    <rect x="1340" y="480" width="160" height="136" rx="22" fill="#eef8fb"/>
    <text x="1366" y="522" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#52718a">MSE</text>
    <text x="1366" y="572" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#0f7c87">0.0629</text>
    <text x="1366" y="604" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">stable fit</text>

    <rect x="1160" y="642" width="340" height="136" rx="22" fill="#f8fbfc" stroke="#d7e9ee"/>
    <text x="1186" y="684" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#103754">Why it matters</text>
    <text x="1186" y="718" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Deep features capture nonlinear growth patterns.</text>
    <text x="1186" y="746" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Heteroscedastic noise modeling improves precision.</text>
    <text x="1186" y="774" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#52718a">Useful for feeding, harvest timing, and farm control.</text>
  </g>
</svg>
